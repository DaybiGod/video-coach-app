# Compila la app iOS SIN Mac y SIN cuenta Apple de pago:
# runner macOS de GitHub -> IPA sin firmar -> instalar con Sideloadly en Windows.
name: Build iOS (sin firma)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'release o dev-client'
        required: false
        default: 'release'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  build-ios:
    runs-on: macos-26 # NO usar macos-latest: puede cambiar bajo tus pies
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Fijar Xcode (la mas nueva 26.x estable del runner)
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_26*.app | sort -V | tail -1)"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci
        env:
          EXPO_NO_TELEMETRY: '1'

      - name: Expo prebuild (genera ios/)
        run: npx expo prebuild --platform ios --no-install
        env:
          EXPO_NO_TELEMETRY: '1'
          CI: '1'

      - name: Hornear ruta absoluta de node (blinda la fase "Bundle RN")
        run: |
          echo "export NODE_BINARY=$(command -v node)" > ios/.xcode.env.local
          cat ios/.xcode.env.local

      - name: Cache de CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: pods-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Pod install
        run: pod install --project-directory=ios

      - name: Detectar y validar workspace y scheme
        id: xc
        run: |
          WS=$(ls -d ios/*.xcworkspace | head -1)
          SCHEME=$(basename "$(ls -d ios/*.xcodeproj | head -1)" .xcodeproj)
          echo "Workspace: $WS | Scheme detectado: $SCHEME"
          # Falla rapido y claro si el scheme no existe (en vez de un error opaco de xcodebuild)
          if ! xcodebuild -list -workspace "$WS" | grep -qw "$SCHEME"; then
            echo "::error::El scheme '$SCHEME' no aparece en el workspace. Schemes disponibles:"
            xcodebuild -list -workspace "$WS" || true
            exit 1
          fi
          echo "workspace=$WS" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"

      - name: Compilar sin firma
        run: |
          CONFIG=Release
          if [ "${{ github.event.inputs.profile }}" = "dev-client" ]; then CONFIG=Debug; fi
          xcodebuild build \
            -workspace "${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration "$CONFIG" \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Empaquetar .ipa (Payload/*.app -> zip)
        run: |
          CONFIG=Release
          if [ "${{ github.event.inputs.profile }}" = "dev-client" ]; then CONFIG=Debug; fi
          APP=$(ls -d build/Build/Products/${CONFIG}-iphoneos/*.app 2>/dev/null | head -1)
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "::error::No se genero ningun .app en ${CONFIG}-iphoneos. Contenido de Products:"
            ls -laR build/Build/Products 2>/dev/null || true
            exit 1
          fi
          echo "App: $APP"
          # Diagnostico (NO gate): con enlazado estatico puede no haber Frameworks/, y es correcto.
          echo "--- Contenido del .app (nivel 1) ---"; ls -la "$APP"
          if [ -d "$APP/Frameworks" ]; then
            echo "--- Frameworks embebidos ---"; ls -la "$APP/Frameworks"
          else
            echo "Sin carpeta Frameworks/ (enlazado estatico: normal)."
          fi
          # El binario principal debe existir y ser Mach-O
          BIN="$APP/$(basename "$APP" .app)"
          file "$BIN" || true
          mkdir Payload
          cp -R "$APP" Payload/
          zip -qry "VideoCoachCam-${CONFIG}.ipa" Payload
          ls -la *.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: VideoCoachCam-${{ github.event.inputs.profile || 'release' }}
          path: '*.ipa'
          retention-days: 14
